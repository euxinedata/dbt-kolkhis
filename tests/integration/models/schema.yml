version: 2
models:
  - name: mat_table_brands
    columns:
      - name: brand_id
        tests:
          - not_null
      - name: name
        tests:
          - not_null

  - name: mat_view_brand_count
    columns:
      - name: total_brands
        tests:
          - not_null

  - name: cross_db_join
    columns:
      - name: brand_id
        tests:
          - not_null
          - unique
